<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skills</title>

    <style>
      #skills {
        padding: 50px;
        text-align: center;
      }

      .skills-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
      }

      .skill-card {
        width: 150px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .skill-card img {
        width: 50px;
        height: 50px;
      }

      .skill-card h3 {
        margin: 10px 0 5px;
      }

      .skill-card p {
        font-size: 14px;
        color: gray;
      }
    </style>
  </head>
  <body>
    <section id="skills">
      <h2>Skills</h2>

      <div class="skills-container">
        <div class="skill-card">
          <img src="html.png" />
          <h3>HTML</h3>
          <p>4 years experience</p>
        </div>

        <div class="skill-card">
          <img src="js.png" />
          <h3>JavaScript</h3>
          <p>3 years experience</p>
        </div>

        <div class="skill-card">
          <img src="java.png" />
          <h3>Java</h3>
          <p>4 years experience</p>
        </div>

        <div class="skill-card">
          <img src="react.png" />
          <h3>React</h3>
          <p>4 years experience</p>
        </div>

        <div class="skill-card">
          <img src="node.png" />
          <h3>Node.js</h3>
          <p>4 years experience</p>
        </div>

        <div class="skill-card">
          <img src="css.png" />
          <h3>CSS</h3>
          <p>4 years experience</p>
        </div>
      </div>
    </section>
  </body>
</html>
