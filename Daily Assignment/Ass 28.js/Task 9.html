<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <button onclick="showMessage()" id="btn">Clike me</button>
    <p id="msg"></p>

    <script>
        function showmessage(){
            document.getElementById("btn").addEventListener("click", 
                function (){
                    document.getElementById("msg").innerText = "Hello Worlds"
                }
            )
        }
        showmessage()
       
    </script>
    
</body>
</html>
