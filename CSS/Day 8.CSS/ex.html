<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

      *{
        text-align: center;
        align-items: center;

      }
        h1{
            text-align: center;
        }

        h2{
          border-bottom: 2px solid rgb(173, 173, 181);
          padding-bottom: 5px;
        
        }
      

         .product-card {
      width: 250px;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      background-color: white;
      box-shadow: 0 2px 5px black;
    }

    .product-card img {
      width: 100%;
      
    }

    .product-card h3 {
      margin: 10px 0 5px;
    }

    .product-card p {
      color: gray;
      font-size: 14px;
    }

    .product-card button {
      background-color: rgb(3, 88, 20);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 0%;
    }



    .P-card{
      width: 250px;
      background-color: white;
      border: 2px solid black;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0px 2px 5px 2px black;

    }
    .pro{
      padding: 8px;
      border-bottom: 2px solid #ddd;
    }

    
    </style>
</head>
<body>

    <h1>Project</h1>

    <h2> Product Card</h2>
    <div class="product-card">
        <img src="./images (2).jpg" alt="image">
        <h3>Toyies</h3>
         <p>High-Quality with is certicificate with anm affordable price for daily use.</p>

         <button id="an"> 
          <a href=""></a>
          Card
        </button>
         
    </div>



    <H2>Profile Card</H2>

    <div class="P-card">
      <div class="pro"><strong>Name:</strong> G.Anbarasu</div>
      <div class="pro"><strong>Role : </strong> Full Stack Developer</div>
      <div class="pro"><strong>Location:</strong> Chennai</div>
    

    </div>

    <h2>Loptop</h2>





</body>
</html>
